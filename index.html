<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Travel</title>
<style>
  :root { color-scheme: light; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    background: #f7f4ee;
    color: #1f1f1f;
  }
  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 18vh 24px 64px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin: 0 0 8px;
  }
  p { margin: 0 0 32px; color: #79706a; font-size: 14px; line-height: 1.7; }
  ul { list-style: none; margin: 0; padding: 0; }
  li + li { margin-top: 12px; }
  a {
    display: block;
    padding: 16px 18px;
    border: 1px solid #e4ddd2;
    border-radius: 12px;
    background: #fff;
    color: inherit;
    text-decoration: none;
    font-size: 15px;
    transition: border-color 0.2s ease;
  }
  a:hover, a:focus-visible { border-color: #b44a2c; }
  a small { display: block; margin-top: 4px; color: #79706a; font-size: 12px; }
</style>
</head>
<body>
<main>
  <h1>Travel</h1>
  <p>旅行计划工作台。</p>
  <ul>
    <li>
      <a href="yixing/">宜兴 · 感官拼配
        <small>泥与窑火 · 春日茶野 · 竹洞水 · 夜晚饭局 — 一个可以自己拼的行程工具</small>
      </a>
    </li>
  </ul>
</main>
</body>
</html>
